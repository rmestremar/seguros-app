<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguros — Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-dot"></div>
            <span>Seguros</span>
        </div>
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-sub">Introduce tus credenciales para acceder</p>
        <div id="loginError" class="alert alert-error" style="display:none;"></div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="tu@email.com">
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn btn-primary btn-full" onclick="login()">Entrar</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
